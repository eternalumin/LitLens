version: '3.8'

services:
  db:
    image: postgres:15
    container_name: litlens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: litlens
      POSTGRES_USER: litlens_user
      POSTGRES_PASSWORD: litlens_pass_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: litlens_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: litlens_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: litlens_frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "8501:8501"
    depends_on:
      - backend
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  postgres_data:
  redis_data:
